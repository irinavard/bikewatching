<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bikewatching</title>
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="map.css" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <script src="map.js" type="module"></script>
  </head>
  <body>
    <header>
      <h1>🚴🏼‍♀️ Bikewatching</h1>
      <label>
        Filter by time:
        <input id="time-slider" type="range" min="-1" max="1440" value="-1" />
        <time id="selected-time"></time>
        <em id="any-time">(any time)</em>
      </label>
    </header>
    <div style="position: relative; width: 100%;">
      <div id="map"></div>
      <svg id="overlay"></svg>
    </div>
    <div class="legend">
      <span>LEGEND:</span>
      <div style="--departure-ratio: 1">
        <span class="swatch"></span> More departures
      </div>
      <div style="--departure-ratio: 0.5">
        <span class="swatch"></span> Balanced
      </div>
      <div style="--departure-ratio: 0">
        <span class="swatch"></span> More arrivals
      </div>
    </div>
  </body>
</html>
